name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Set these in repo Settings → Secrets and variables → Actions.
          # Production uses the token proxy (Cloudflare Worker) — the browser
          # can't reach the Keycloak token endpoint (no CORS).
          VITE_TOKEN_PROXY_URL: ${{ secrets.VITE_TOKEN_PROXY_URL }}
          VITE_SH_CLIENT_ID: ${{ secrets.VITE_SH_CLIENT_ID }}
          VITE_SH_CLIENT_SECRET: ${{ secrets.VITE_SH_CLIENT_SECRET }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
