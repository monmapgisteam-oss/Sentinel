# Nginx config for hosting Mongolia Imagery Explorer at sentinel.monmap.mn.
#
# Serves the static Vite build (dist/) and reverse-proxies the Copernicus Data
# Space endpoints — replacing the Vite dev proxy so the app works in production.
#
# 1) Build:   npm run build        → produces dist/
# 2) Copy dist/ to the server (e.g. /var/www/sentinel/dist)
# 3) Put this file in /etc/nginx/sites-available/ and enable it
# 4) Add TLS (certbot --nginx -d sentinel.monmap.mn) — recommended

server {
    listen 80;
    server_name sentinel.monmap.mn;

    root /var/www/sentinel/dist;
    index index.html;

    # Single-page app: serve index.html for any unmatched path.
    location / {
        try_files $uri /index.html;
    }

    # Copernicus token endpoint (was the Vite /cdse-auth proxy).
    location /cdse-auth/ {
        proxy_pass https://identity.dataspace.copernicus.eu/;
        proxy_set_header Host identity.dataspace.copernicus.eu;
        proxy_ssl_server_name on;
    }

    # Sentinel Hub Process / Catalog / Statistics (was the Vite /cdse-sh proxy).
    location /cdse-sh/ {
        proxy_pass https://sh.dataspace.copernicus.eu/;
        proxy_set_header Host sh.dataspace.copernicus.eu;
        proxy_ssl_server_name on;
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
